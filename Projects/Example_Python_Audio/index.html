<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Audio Spectrum Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0b0f19;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
            width: 80%;
            max-width: 800px;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a0aec0;
            margin-bottom: 2rem;
        }

        .upload-btn {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        input[type="file"] {
            display: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #audio-player {
            display: none;
            margin-top: 2rem;
            width: 100%;
        }

        #status {
            margin-top: 1rem;
            color: #4ade80;
            font-weight: 600;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>
    <a href="/"
        style="position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; font-size: 1.1rem; font-weight: 600; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; z-index: 1000; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; display: flex; align-items: center; gap: 8px;"
        onmouseover="this.style.background='rgba(255,255,255,0.2)'"
        onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        <span>←</span> Späť na portál
    </a>
    <canvas id="visualizer"></canvas>

    <div class="container" id="main-box">
        <h1>Neural Audio Insights</h1>
        <p>Advanced Python Audio Processing Service (Frontend Mock)</p>

        <label class="upload-btn">
            Upload Audio (.mp3, .wav)
            <input type="file" id="audio-upload" accept="audio/*">
        </label>

        <div id="status">Analyzujem audio stopy...</div>
        <audio id="audio-player" controls></audio>
    </div>

    <script>
        const fileInput = document.getElementById('audio-upload');
        const audio = document.getElementById('audio-player');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const mainBox = document.getElementById('main-box');
        const statusEl = document.getElementById('status');

        let audioCtx, analyser, source, dataArray, bufferLength;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        fileInput.addEventListener('change', function () {
            const files = this.files;
            if (files.length === 0) return;

            statusEl.style.opacity = '1';
            statusEl.innerText = "Uploadujem na Python backend...";

            setTimeout(() => {
                statusEl.innerText = "Analyzovanie dokončené! Prehrávam výsledok.";
                const fileURL = URL.createObjectURL(files[0]);
                audio.src = fileURL;
                audio.style.display = 'block';
                canvas.style.opacity = '0.8';
                mainBox.style.transform = 'translateY(-15vh)';
                mainBox.style.backgroundColor = 'rgba(10, 15, 25, 0.8)';
                initAudio();
                audio.play();
            }, 1500);
        });

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            ctx.fillStyle = 'rgba(11, 15, 25, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] * 2.5;
                const r = barHeight + (25 * (i / bufferLength));
                const g = 250 * (i / bufferLength);
                const b = 255;

                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(x, canvas.height - barHeight / 2, barWidth, barHeight / 2);
                x += barWidth + 2;
            }
        }
    </script>
</body>

</html>
